<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تتبع قطع الغيار</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">

<!-- Firebase v8 compat -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-messaging.js"></script>

<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #22263a;
  --border: #2e3250;
  --accent: #f59e0b;
  --accent2: #3b82f6;
  --text: #e8eaf0;
  --muted: #7b82a0;
  --danger: #ef4444;
  --success: #22c55e;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Cairo', Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}

.header-title {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 18px;
  font-weight: 700;
  color: var(--accent);
}

.header-nav { display: flex; gap: 8px; flex-wrap: wrap; }

.btn-nav {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 7px 14px;
  border-radius: 8px;
  cursor: pointer;
  font-family: 'Cairo', Arial, sans-serif;
  font-size: 13px;
  text-decoration: none;
  display: inline-block;
  transition: all .2s;
}
.btn-nav:hover { border-color: var(--accent); color: var(--accent); }

.notif-status {
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 20px;
  font-weight: 600;
}
.notif-on  { background: #22c55e22; color: #22c55e; border: 1px solid #22c55e44; }
.notif-off { background: #ef444422; color: #ef4444; border: 1px solid #ef444444; }

.main { padding: 20px; max-width: 1100px; margin: 0 auto; }

.add-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 20px;
  margin-bottom: 24px;
}

.add-card h3 {
  font-size: 15px;
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 16px;
}

.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
@media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }
.form-grid .full { grid-column: 1 / -1; }

label {
  display: block;
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 5px;
  font-weight: 600;
}

input, select, textarea {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 10px 12px;
  border-radius: 8px;
  font-family: 'Cairo', Arial, sans-serif;
  font-size: 14px;
  outline: none;
  transition: border-color .2s;
}
input:focus, select:focus, textarea:focus { border-color: var(--accent); }
textarea { resize: vertical; min-height: 70px; }
select option { background: var(--surface2); }

.reminder-row {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
}
.reminder-row label { margin: 0; flex: 1; color: var(--text); font-size: 13px; }
.reminder-row input[type=number] {
  width: 70px;
  text-align: center;
  padding: 7px;
}
.reminder-row select {
  width: auto;
  padding: 7px 10px;
  font-size: 13px;
}

.btn-add {
  background: var(--accent);
  color: #000;
  border: none;
  padding: 11px 28px;
  border-radius: 8px;
  font-family: 'Cairo', Arial, sans-serif;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: opacity .2s;
  margin-top: 4px;
}
.btn-add:hover { opacity: .85; }
.btn-add:disabled { opacity: .5; cursor: not-allowed; }

.filter-bar {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 20px;
  align-items: center;
}
.filter-bar select, .filter-bar input {
  width: auto; flex: 1;
  min-width: 130px; max-width: 220px;
}
.count-badge {
  margin-right: auto;
  background: var(--surface2);
  border: 1px solid var(--border);
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 13px;
  color: var(--muted);
  white-space: nowrap;
}

.parts-list { display: flex; flex-direction: column; gap: 12px; }

.part-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  transition: border-color .2s;
}
.part-card:hover { border-color: var(--accent2); }

.part-card.overdue { border-color: #ef444488 !important; }
.overdue-tag {
  font-size: 11px;
  background: #ef444422;
  color: #ef4444;
  border: 1px solid #ef444444;
  padding: 2px 8px;
  border-radius: 20px;
  font-weight: 700;
}

.part-card-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 18px;
  cursor: pointer;
  user-select: none;
  flex-wrap: wrap;
}

.part-stage-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
.part-name { font-size: 15px; font-weight: 700; flex: 1; min-width: 120px; }
.part-machine { font-size: 12px; color: var(--muted); background: var(--surface2); padding: 3px 10px; border-radius: 20px; }
.stage-badge { font-size: 12px; font-weight: 700; padding: 4px 12px; border-radius: 20px; white-space: nowrap; }
.part-days { font-size: 12px; color: var(--muted); white-space: nowrap; }
.part-expand-icon { color: var(--muted); font-size: 12px; transition: transform .2s; }
.part-card.expanded .part-expand-icon { transform: rotate(180deg); }

.part-body { display: none; padding: 0 18px 18px; border-top: 1px solid var(--border); }
.part-card.expanded .part-body { display: block; }

.timeline { margin: 18px 0 20px; position: relative; padding-right: 28px; }
.timeline::before { content: ''; position: absolute; right: 5px; top: 0; bottom: 0; width: 2px; background: var(--border); }
.tl-item { position: relative; margin-bottom: 16px; padding-right: 24px; }
.tl-dot { position: absolute; right: -29px; top: 4px; width: 12px; height: 12px; border-radius: 50%; border: 2px solid var(--bg); }
.tl-item.active .tl-dot { box-shadow: 0 0 0 3px rgba(245,158,11,.3); }
.tl-label { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
.tl-date  { font-size: 11px; color: var(--muted); }
.tl-note  { font-size: 12px; color: var(--muted); margin-top: 4px; background: var(--surface2); padding: 6px 10px; border-radius: 6px; border-right: 3px solid var(--border); }
.tl-item.pending .tl-label { color: var(--border); }
.tl-item.pending .tl-dot   { background: var(--border); border-color: var(--border); }

.reminder-info { background: #f59e0b11; border: 1px solid #f59e0b33; border-radius: 8px; padding: 10px 14px; margin-bottom: 14px; font-size: 13px; display: flex; align-items: center; gap: 8px; }
.reminder-info.overdue-info { background: #ef444411; border-color: #ef444433; color: #ef4444; }

.update-section { background: var(--surface2); border-radius: 10px; padding: 14px; }
.update-section h4 { font-size: 13px; font-weight: 700; color: var(--accent); margin-bottom: 12px; }
.update-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
@media (max-width: 500px) { .update-row { grid-template-columns: 1fr; } }

.btn-update { background: var(--accent2); color: #fff; border: none; padding: 9px 20px; border-radius: 8px; font-family: 'Cairo', Arial, sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; transition: opacity .2s; }
.btn-update:hover { opacity: .85; }

.part-meta { display: flex; gap: 16px; flex-wrap: wrap; margin: 14px 0 16px; }
.meta-item { display: flex; flex-direction: column; gap: 2px; }
.meta-item .key { font-size: 11px; color: var(--muted); font-weight: 600; }
.meta-item .val { font-size: 13px; font-weight: 600; }

.empty { text-align: center; padding: 60px 20px; color: var(--muted); }
.empty .icon { font-size: 48px; margin-bottom: 12px; }
.empty p { font-size: 14px; }
.loading { text-align: center; padding: 40px; color: var(--muted); font-size: 14px; }

#toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--success); color: #fff; padding: 12px 24px; border-radius: 10px; font-size: 14px; font-weight: 600; z-index: 9999; transition: transform .3s; pointer-events: none; }
#toast.show  { transform: translateX(-50%) translateY(0); }
#toast.error { background: var(--danger); }
</style>
</head>

<body>

<div class="header">
  <div class="header-title">🔩 تتبع قطع الغيار</div>
  <div class="header-nav">
    <span class="notif-status notif-off" id="notifBadge">🔕 إشعارات</span>
    <a href="request.html" class="btn-nav">📋 طلبات</a>
    <a href="dashboard.html" class="btn-nav">📊 لوحة التحكم</a>
    <button class="btn-nav" onclick="logout()">خروج</button>
  </div>
</div>

<div class="main">

  <div class="add-card" id="addSection">
    <h3>➕ تسجيل قطعة غيار جديدة</h3>
    <div class="form-grid">
      <div>
        <label>اسم القطعة *</label>
        <input id="partName" placeholder="مثال: موتور الشد الرئيسي" />
      </div>
      <div>
        <label>رقم القطعة / Serial</label>
        <input id="partSerial" placeholder="اختياري" />
      </div>
      <div>
        <label>الماكينة *</label>
        <select id="partMachine">
          <option>Web 7</option>
          <option>Web 8</option>
          <option>Web 9</option>
          <option>Line 1</option>
          <option>Line 2</option>
          <option>Line 3</option>
        </select>
      </div>
      <div>
        <label>مركز الإصلاح الخارجي</label>
        <input id="partCenter" placeholder="اسم الشركة / المركز" />
      </div>
      <div class="full">
        <label>ملاحظة عند الإخراج</label>
        <textarea id="partNote" placeholder="وصف المشكلة أو سبب الإرسال للمركز..."></textarea>
      </div>

      <!-- ── REMINDER ── -->
      <div class="full">
        <div class="reminder-row">
          <label>⏰ تذكير لو القطعة مرجعتش بعد</label>
          <input type="number" id="reminderValue" value="7" min="1" max="365" />
          <select id="reminderUnit">
            <option value="minutes">دقائق</option>
            <option value="hours">ساعات</option>
            <option value="days" selected>أيام</option>
          </select>
        </div>
        <div style="font-size:11px;color:var(--muted);margin-top:6px;padding-right:4px;">
          هيتبعت إشعار لكل المستخدمين لو القطعة لسه في مرحلة خارج المصنع بعد المدة دي
        </div>
      </div>
    </div>
    <button class="btn-add" id="addBtn" onclick="addPart()">📤 تسجيل الإخراج للإصلاح</button>
  </div>

  <div class="filter-bar">
    <select id="filterStage" onchange="render()">
      <option value="all">كل المراحل</option>
      <option value="0">📤 خرجت للمركز</option>
      <option value="1">🔧 تحت الإصلاح</option>
      <option value="2">📥 رجعت من المركز</option>
      <option value="3">⚙️ اتجربت في الماكينة</option>
      <option value="4">🛡️ في الضمان</option>
      <option value="5">✅ مكتملة</option>
    </select>
    <select id="filterMachine" onchange="render()">
      <option value="all">كل الماكينات</option>
      <option>Web 7</option><option>Web 8</option><option>Web 9</option>
      <option>Line 1</option><option>Line 2</option><option>Line 3</option>
    </select>
    <input type="text" id="filterSearch" placeholder="🔍 ابحث باسم القطعة..." oninput="render()" />
    <span class="count-badge" id="countBadge">— قطعة</span>
  </div>

  <div id="partsList" class="parts-list">
    <div class="loading">⏳ جاري التحميل...</div>
  </div>

</div>

<div id="toast"></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDZ1RAn4fIN6Rqc-b5-BoHiiNFQ9GvZZJA",
  authDomain: "parts-7e82e.firebaseapp.com",
  projectId: "parts-7e82e",
  storageBucket: "parts-7e82e.firebasestorage.app",
  messagingSenderId: "198514736431",
  appId: "1:198514736431:web:3e88fb478f4cfc910035da",
  measurementId: "G-8PS0P7Z95X"
};

firebase.initializeApp(firebaseConfig);
const db        = firebase.firestore();
const messaging = firebase.messaging();

const currentUser = localStorage.getItem("user");
const role        = localStorage.getItem("role");
const canEdit     = (currentUser === "ahmed" || currentUser === "amr");

//if (!currentUser) location.href = "index.html";
if (!canEdit) document.getElementById("addSection").style.display = "none";

function logout() { localStorage.clear(); location.href = "index.html"; }

const STAGES = [
  { label: "خرجت للمركز",        icon: "📤", color: "#6366f1" },
  { label: "تحت الإصلاح",        icon: "🔧", color: "#f59e0b" },
  { label: "رجعت من المركز",     icon: "📥", color: "#3b82f6" },
  { label: "اتجربت في الماكينة", icon: "⚙️", color: "#a855f7" },
  { label: "في الضمان",           icon: "🛡️", color: "#22c55e" },
  { label: "مكتملة",              icon: "✅", color: "#10b981" },
];

const OUTSIDE_STAGES = new Set([0, 1]);

async function startNotifications() {
  try {
    const permission = await Notification.requestPermission();
    if (permission !== 'granted') {
      console.log("Permission denied");
      updateNotifBadge(false);
      return;
    }

    const registration = await navigator.serviceWorker.register('/firebase-messaging-sw.js');
    console.log("SW Registered");

    const token = await messaging.getToken({
      vapidKey: 'BLeQCahZDRsoXPJUFE3SshG7hMHzqPeVts8SG3b4b526BENvcerNez7htoPy03CQtI1GZYOUBFJd0Ddz1l4biuc',
      serviceWorkerRegistration: registration
    });

    if (!token) { console.log("No FCM token"); updateNotifBadge(false); return; }

    await db.collection("tokens").doc(token).set({
      token:     token,
      user:      currentUser || "unknown",
      createdAt: new Date()
    });

    updateNotifBadge(true);

    messaging.onMessage(async (payload) => {
      const reg = await navigator.serviceWorker.getRegistration();
      if (reg) {
        reg.showNotification(payload.notification.title, {
          body:    payload.notification.body,
          icon:    '/icon-192.png',
          badge:   '/icon-192.png',
          vibrate: [200, 100, 200]
        });
      }
    });
  } catch(e) {
    console.error(e);
    updateNotifBadge(false);
  }
}

function updateNotifBadge(on) {
  const b = document.getElementById("notifBadge");
  if (on) { b.textContent = "🔔 إشعارات مفعّلة"; b.className = "notif-status notif-on"; }
  else    { b.textContent = "🔕 إشعارات";        b.className = "notif-status notif-off"; }
}

startNotifications();

async function sendNotificationToAll(title, body) {
  try {
    // Vercel بيجيب التوكنات هو نفسه من Firestore — مش محتاج token من هنا
    const response = await fetch('/api/notify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title, body })
    });
    const result = await response.json();
    console.log('[notify] sent:', result);
  } catch (e) {
    console.error('[notify] error:', e);
  }
}


let allParts = [];

db.collection("parts").orderBy("createdAt", "desc").onSnapshot(snap => {
  allParts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  render();
});

// تشغيل فحص التذكيرات كل 60 ثانية (تلقائياً)


function getDeadline(p) {
  const val = p.reminderValue || p.reminderDays;
  if (!val) return null;
  const unit = p.reminderUnit || 'days';
  const created = p.createdAt?.toDate ? p.createdAt.toDate() : new Date(p.createdAt);
  const deadline = new Date(created);
  if (unit === 'minutes') deadline.setMinutes(deadline.getMinutes() + val);
  else if (unit === 'hours') deadline.setHours(deadline.getHours() + val);
  else deadline.setDate(deadline.getDate() + val);
  return deadline;
}


async function addPart() {
  const name          = document.getElementById("partName").value.trim();
  const serial        = document.getElementById("partSerial").value.trim();
  const machine       = document.getElementById("partMachine").value;
  const center        = document.getElementById("partCenter").value.trim();
  const note          = document.getElementById("partNote").value.trim();
  const reminderValue = parseInt(document.getElementById("reminderValue").value) || 7;
  const reminderUnit  = document.getElementById("reminderUnit").value;

  if (!name) { showToast("اكتب اسم القطعة ❌", true); return; }

  const btn = document.getElementById("addBtn");
  btn.disabled = true;
  btn.innerText = "⏳ جاري الحفظ...";

  try {
    const now = new Date();
    await db.collection("parts").add({
      name,
      serial:      serial || "",
      machine,
      center:      center || "",
      stage:       0,
      reminderValue,
      reminderUnit,
      createdAt:   now,
      createdBy:   currentUser,
      history: [{
        stage: 0,
        date:  now.toISOString(),
        by:    currentUser,
        note:  note || ""
      }]
    });

    const unitAr = reminderUnit === 'minutes' ? 'دقيقة' : (reminderUnit === 'hours' ? 'ساعة' : 'يوم');
    await sendNotificationToAll(
      "📤 قطعة غيار خرجت للإصلاح",
      `${name} — ${machine} — أرسلها ${currentUser} | تذكير بعد ${reminderValue} ${unitAr}`
    );

    ["partName","partSerial","partCenter","partNote"].forEach(id => document.getElementById(id).value = "");
    document.getElementById("reminderValue").value = "7";
    document.getElementById("reminderUnit").value = "days";

    showToast("تم تسجيل القطعة ✅");
  } catch(e) {
    showToast("خطأ: " + e.message, true);
  }

  btn.disabled = false;
  btn.innerText = "📤 تسجيل الإخراج للإصلاح";
}

async function updateStage(partId) {
  const newStage = parseInt(document.getElementById("sel_stage_" + partId).value);
  const note     = document.getElementById("inp_note_"  + partId).value.trim();
  const part = allParts.find(p => p.id === partId);
  if (!part) return;

  const now     = new Date();
  const history = [...(part.history || []), {
    stage: newStage,
    date:  now.toISOString(),
    by:    currentUser,
    note:  note || ""
  }];

  try {
    await db.collection("parts").doc(partId).update({ stage: newStage, history, updatedAt: now });
    await sendNotificationToAll(
      `${STAGES[newStage].icon} قطعة غيار: ${STAGES[newStage].label}`,
      `${part.name} — ${part.machine} — حدّثها ${currentUser}`
    );
    const noteInput = document.getElementById("inp_note_" + partId);

if (noteInput) {
  noteInput.value = "";
}
    showToast("تم التحديث ✅");
  } catch(e) {
    showToast("خطأ: " + e.message, true);
  }
}

function render() {
  const stageFilter   = document.getElementById("filterStage").value;
  const machineFilter = document.getElementById("filterMachine").value;
  const search        = document.getElementById("filterSearch").value.toLowerCase();

  let data = allParts.filter(p => {
    const stageOk   = stageFilter === "all" || p.stage === parseInt(stageFilter);
    const machineOk = machineFilter === "all" || p.machine === machineFilter;
    const searchOk  = !search || p.name.toLowerCase().includes(search) || (p.serial || "").toLowerCase().includes(search);
    return stageOk && machineOk && searchOk;
  });

  document.getElementById("countBadge").innerText = data.length + " قطعة";
  const list = document.getElementById("partsList");

  if (data.length === 0) {
    list.innerHTML = `<div class="empty"><div class="icon">🔩</div><p>مفيش قطع غيار في الفلتر دا</p></div>`;
    return;
  }
  list.innerHTML = data.map(p => renderCard(p)).join("");
}

function isOverdue(p) {
  if (!OUTSIDE_STAGES.has(p.stage)) return false;
  const deadline = getDeadline(p);
  if (!deadline) return false;
  return new Date() > deadline;
}

function renderCard(p) {
  const stage       = STAGES[p.stage] || STAGES[0];
  const history     = p.history || [];
  const created     = p.createdAt?.toDate ? p.createdAt.toDate() : new Date(p.createdAt);
  
  const timePassedMs = Date.now() - created.getTime();
  const daysP  = Math.floor(timePassedMs / 86400000);
  const hoursP = Math.floor(timePassedMs / 3600000);
  const minsP  = Math.floor(timePassedMs / 60000);
  
  let timePassedStr = `${daysP} يوم`;
  if (daysP === 0) timePassedStr = hoursP > 0 ? `${hoursP} ساعة` : `${minsP} دقيقة`;

  const overdue = isOverdue(p);

  const timelineHtml = STAGES.map((s, i) => {
    const entry    = history.find(h => h.stage === i);
    const isActive = p.stage === i;
    const isDone   = p.stage > i;
    let cls = "tl-item" + (isActive ? " active" : "") + (!entry && !isActive ? " pending" : "");
    const dateStr = entry ? new Date(entry.date).toLocaleString("ar-EG") : "";
    const noteHtml = entry?.note ? `<div class="tl-note">${entry.note}</div>` : "";
    const byHtml   = entry?.by   ? ` · ${entry.by}` : "";
    return `
      <div class="${cls}">
        <div class="tl-dot" style="background:${isDone||isActive ? s.color : 'var(--border)'}"></div>
        <div class="tl-label" style="${isDone||isActive ? `color:${s.color}` : ''}">${s.icon} ${s.label}</div>
        ${dateStr ? `<div class="tl-date">${dateStr}${byHtml}</div>` : ''}
        ${noteHtml}
      </div>`;
  }).join("");

  const val = p.reminderValue || p.reminderDays;
  const unit = p.reminderUnit || 'days';
  const unitAr = unit === 'minutes' ? 'دقيقة' : (unit === 'hours' ? 'ساعة' : 'يوم');

  let reminderBanner = "";
  if (val && OUTSIDE_STAGES.has(p.stage)) {
    const deadline = getDeadline(p);
    const msLeft = deadline - Date.now();
    const isOver = msLeft < 0;
    const absMs = Math.abs(msLeft);
    
    let timeLeftStr = "";
    if (absMs < 3600000) timeLeftStr = Math.ceil(absMs / 60000) + " دقيقة";
    else if (absMs < 86400000) timeLeftStr = Math.ceil(absMs / 3600000) + " ساعة";
    else timeLeftStr = Math.ceil(absMs / 86400000) + " يوم";

    if (isOver) {
      reminderBanner = `
        <div class="reminder-info overdue-info">
          ⚠️ تعدّت المدة المحددة بـ ${timeLeftStr} — يتم إرسال إشعار يومي
        </div>`;
    } else {
      reminderBanner = `
        <div class="reminder-info">
          ⏰ تذكير بعد ${timeLeftStr} (${deadline.toLocaleString("ar-EG")})
        </div>`;
    }
  }

  const nextOptions = STAGES.map((s, i) => i <= p.stage ? "" : `<option value="${i}">${s.icon} ${s.label}</option>`).join("");
  const updateHtml = canEdit && p.stage < 5 ? `
    <div class="update-section">
      <h4>🔄 تحديث المرحلة</h4>
      <div class="update-row">
        <div>
          <label>المرحلة الجديدة</label>
          <select id="sel_stage_${p.id}">${nextOptions}</select>
        </div>
        <div>
          <label>ملاحظة (اختياري)</label>
          <input id="inp_note_${p.id}" placeholder="مثال: تم الإصلاح والاختبار" />
        </div>
      </div>
      <button class="btn-update" onclick="updateStage('${p.id}')">حفّظ التحديث</button>
    </div>` :
    (p.stage === 5 ? `<div style="color:var(--success);font-size:13px;font-weight:700;">✅ القطعة دي اكتملت بنجاح</div>` : '');

  return `
    <div class="part-card${overdue ? ' overdue' : ''}" id="card_${p.id}">
      <div class="part-card-header" onclick="toggleCard('${p.id}')">
        <div class="part-stage-dot" style="background:${stage.color}"></div>
        <div class="part-name">${p.name} ${p.serial ? `<span style="font-size:12px;color:var(--muted)">(${p.serial})</span>` : ''}</div>
        <span class="part-machine">${p.machine}</span>
        <span class="stage-badge" style="background:${stage.color}22;color:${stage.color}">${stage.icon} ${stage.label}</span>
        ${overdue ? `<span class="overdue-tag">⚠️ تأخرت</span>` : ''}
        <span class="part-days">${timePassedStr}</span>
        <span class="part-expand-icon">▼</span>
      </div>
      <div class="part-body">
        <div class="part-meta">
          ${p.center ? `<div class="meta-item"><span class="key">مركز الإصلاح</span><span class="val">🏭 ${p.center}</span></div>` : ''}
          <div class="meta-item"><span class="key">أضافها</span><span class="val">👤 ${p.createdBy}</span></div>
          <div class="meta-item"><span class="key">تاريخ الإخراج</span><span class="val">📅 ${created.toLocaleDateString("ar-EG")}</span></div>
          <div class="meta-item"><span class="key">المدة الكلية</span><span class="val">⏱️ ${timePassedStr}</span></div>
          ${val ? `<div class="meta-item"><span class="key">مدة التذكير</span><span class="val">⏰ ${val} ${unitAr}</span></div>` : ''}
        </div>
        ${reminderBanner}
        <div class="timeline">${timelineHtml}</div>
        ${updateHtml}
      </div>
    </div>`;
}

function toggleCard(id) { document.getElementById("card_" + id).classList.toggle("expanded"); }

function showToast(msg, isError = false) {
  const t = document.getElementById("toast");
  t.innerText  = msg;
  t.className  = isError ? "error" : "";
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 3000);
}
  window.addEventListener("load", () => {
  const params = new URLSearchParams(window.location.search);
  const partId = params.get("part");

  if (!partId) return;

  setTimeout(() => {
    const card = document.getElementById("card_" + partId);

    if (card) {
      card.classList.add("expanded");
      card.scrollIntoView({
        behavior: "smooth",
        block: "center"
      });
    }
  }, 1500);
});
</script>
</body>
</html>
