<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Parts Tracker</title>

<style>
body{
font-family:Cairo,sans-serif;
background:#f5f5f5;
margin:0;
padding:15px;
}

.card{
background:#fff;
padding:15px;
border-radius:12px;
margin-bottom:12px;
box-shadow:0 2px 8px rgba(0,0,0,.08);
}

input,textarea{
width:100%;
padding:12px;
margin:6px 0;
border:1px solid #ddd;
border-radius:10px;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#0d6efd;
color:white;
margin-top:8px;
}

.stats{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin-bottom:15px;
}

.stat{
background:white;
padding:10px;
border-radius:10px;
text-align:center;
}

.part{
background:white;
padding:15px;
border-radius:12px;
margin-bottom:10px;
box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.badge{
display:inline-block;
padding:5px 10px;
border-radius:20px;
color:white;
font-size:13px;
}

.out{background:#dc3545;}
.returned{background:#0dcaf0;}
.installed{background:#198754;}
</style>

</head>
<body>

<h2>📦 Parts Tracker</h2>

<div class="stats">

<div class="stat">
<div id="outCount">0</div>
<div>خارج للصيانة</div>
</div>

<div class="stat">
<div id="returnedCount">0</div>
<div>عادت</div>
</div>

<div class="stat">
<div id="installedCount">0</div>
<div>تم تركيبها</div>
</div>

<div class="stat">
<div id="totalCount">0</div>
<div>إجمالي القطع</div>
</div>

</div>

<div class="card">

<h3>إضافة قطعة</h3>

<input id="partName" placeholder="اسم القطعة">

<input id="manufacturer" placeholder="الشركة المصنعة">

<input id="partNumber" placeholder="رقم القطعة">

<input id="machine" placeholder="اسم الماكينة">

<input id="repairCenter" placeholder="مركز الإصلاح">

<input id="repairSerial" placeholder="رقم المركز">

<textarea id="reason" placeholder="سبب الخروج"></textarea>

<textarea id="notes" placeholder="ملاحظات"></textarea>

<button id="saveBtn">
حفظ القطعة
</button>

</div>

<div id="partsContainer"></div>

<script type="module" src="js/parts.js"></script>

</body>
</html>
